<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mac App Store Reviews</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>
    
    <div class="container">
        <header>
            <div class="header-content">
                <h1>Mac App Store Reviews</h1>
                <p id="developer-name-display">Tracking feedback for Your Apps</p>
                <div id="connection-status" class="hidden" style="margin-top: 8px; font-size: 14px; display: flex; align-items: center; gap: 6px;"></div>
            </div>
            <div class="stats">
                <button id="test-telegram-btn" class="action-btn">Send Summary</button>
                <div class="stat-box">
                    <span class="stat-label">Total Reviews</span>
                    <span class="stat-value" id="total-reviews">-</span>
                </div>
            </div>
        </header>

        <main>
            <div id="loading" class="loading">
                <div class="spinner"></div>
                <p>Fetching latest reviews...</p>
            </div>
            
            <div id="reviews-grid" class="reviews-grid hidden">
                <!-- Reviews will be injected here via JS -->
            </div>
            
            <div id="empty-state" class="empty-state hidden">
                <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                </svg>
                <h3>No reviews found</h3>
                <p>Wait for the next polling cycle or check your store configuration.</p>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
